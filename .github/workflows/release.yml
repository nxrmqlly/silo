name: Go Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-X 'github.com/nxrmqlly/silo/internal/cli.Version=${TAG}'" -o silo ./cmd/silo

      - uses: softprops/action-gh-release@v2
        with:
          files: silo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}